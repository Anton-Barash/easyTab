name: Сборка Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Клонировать код
        uses: actions/checkout@v4

      - name: Установить Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Права на выполнение Gradle
        run: chmod +x ./gradlew

      - name: Собрать релизный APK
        run: ./gradlew assembleRelease --no-build-cache --no-daemon

      - name: Сохранить APK как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
