<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
/* Основной контейнер */
.chat-input-container {
  width: 100%;
  max-width: 650px;
  border: 1px solid #E2E8F0;
  border-radius: 6px;
  padding: 8px 14px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  background: #FFFFFF;
}

/* Текстовое поле — без ограничения высоты */
.chat-input {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  resize: none;
  overflow-y: auto;
  padding: 0;
  margin: 0;
  font-size: 15px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-weight: 450;
  color: #333333;
}

/* Плейсхолдер */
.chat-input::placeholder {
  color: #8E95A1;
  font-weight: 400;
}

/* Кнопка под текстом, справа */
.input-bottom {
  display: flex;
  justify-content: flex-end;
  margin-top: 6px;
}

/* УЛУЧШЕННАЯ КНОПКА СКРЕПКИ */
.attach-button {
  width: 30px;
  height: 30px;
  border-radius: 6px;
  border: none;
  background: #F5F7FA;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  color: #555;
  transition: 0.2s;
}
.attach-button:hover {
  background: #E2E8F0;
}

/* Квадрат 80×80px */
.square-block {
  width: 80px;
  height: 80px;
  background: #F5F7FA;
  margin-top: 8px;
  border-radius: 4px;
}

.file-input {
  display: none;
}
</style>
</head>

<body>
<div class="chat-input-container">
  <textarea class="chat-input" placeholder="Введите сообщение..."></textarea>

  <!-- КНОПКА СРАЗУ ПОД ТЕКСТОМ -->
  <div class="input-bottom">
    <label class="attach-button">
                      📎
      <input type="file" class="file-input">
    </label>
  </div>

  <!-- КВАДРАТ ПОД КНОПКОЙ -->
  <div class="square-block"></div>
</div>

<script>
const textarea = document.querySelector('.chat-input');
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = textarea.scrollHeight + 'px';
});
</script>
</body>
</html>
